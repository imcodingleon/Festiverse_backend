name: Deploy to EC2

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: [self-hosted, festiverse-backend]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Build and deploy
        run: |
          cd ~/Festiverse_backend
          git pull origin master
          docker build -t festiverse-app .
          docker rm -f festiverse-app || true
          docker run -d --name festiverse-app --env-file .env -p 8000:8000 --restart always festiverse-app
